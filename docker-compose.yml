services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: node_server
    env_file:
      - server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge